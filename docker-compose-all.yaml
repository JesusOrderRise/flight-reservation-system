services:
  mailhog:
    image: mailhog/mailhog:latest
    container_name: frsystem_mailhog
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"
      - "${MAILHOG_WEB_PORT}:8025"

  postgres:
    image: postgres:latest
    container_name: frsystem-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  
  pgAdmin:
    image: dpage/pgadmin4:latest
    container_name: frsystem-pgAdmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"

  frsystem-backend:
    build:
      context: ./frsystem-backend
      dockerfile: Dockerfile
    container_name: frsystem-backend
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - MAILHOG_HOST=mailhog
      - MAILHOG_SMTP_PORT=${MAILHOG_SMTP_PORT}
      - MAILHOG_WEB_PORT=${MAILHOG_WEB_PORT}
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      - postgres
      - mailhog
volumes:  
  postgres_data:

    


